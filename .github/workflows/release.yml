name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use SEMANTIC_RELEASE_TOKEN (PAT with contents:write) when branch protection blocks GITHUB_TOKEN pushes.
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      # Org policy: only GitHub + org-owned actions — Corepack + actions/cache (no pnpm/action-setup).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Enable pnpm via Corepack
        run: corepack enable && corepack prepare pnpm@10.11.0 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Bundled npm can omit readme on per-version registry JSON; npmjs Readme tab then shows a false
      # “no README” while README.md is in the tarball. Latest publish CLI improves metadata consistency.
      - name: Use latest npm for publish
        run: npm install -g npm@latest

      - name: Run semantic-release
        env:
          HUSKY: "0"
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_NOTES_AI: ${{ vars.RELEASE_NOTES_AI }}
          RELEASE_NOTES_AI_ENDPOINT: ${{ vars.RELEASE_NOTES_AI_ENDPOINT }}
          RELEASE_NOTES_AI_MODEL: ${{ vars.RELEASE_NOTES_AI_MODEL }}
          RELEASE_NOTES_AI_DEBUG: ${{ vars.RELEASE_NOTES_AI_DEBUG }}
          RELEASE_NOTES_AI_API_KEY: ${{ secrets.RELEASE_NOTES_AI_API_KEY }}
        run: pnpm exec semantic-release
