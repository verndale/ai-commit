name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        env:
          HUSKY: "0"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_NOTES_AI: ${{ vars.RELEASE_NOTES_AI }}
          RELEASE_NOTES_AI_ENDPOINT: ${{ vars.RELEASE_NOTES_AI_ENDPOINT }}
          RELEASE_NOTES_AI_MODEL: ${{ vars.RELEASE_NOTES_AI_MODEL }}
          RELEASE_NOTES_AI_DEBUG: ${{ vars.RELEASE_NOTES_AI_DEBUG }}
          RELEASE_NOTES_AI_API_KEY: ${{ secrets.RELEASE_NOTES_AI_API_KEY }}
        run: pnpm exec semantic-release
